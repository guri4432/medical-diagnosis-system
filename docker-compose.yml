version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://mediscan_user:mediscan_pass@db:5432/mediscan_db
    depends_on:
      - db
    volumes:
      - ./models:/app/models

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mediscan_user
      - POSTGRES_PASSWORD=mediscan_pass
      - POSTGRES_DB=mediscan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
